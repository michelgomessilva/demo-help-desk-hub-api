# ============================================================================
# Tempo — armazenamento de traces (configuração mínima)
# ============================================================================
# Recebe traces via OTLP e guarda em filesystem local. O Grafana consulta a
# API HTTP do Tempo na porta 3200.
# ============================================================================

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

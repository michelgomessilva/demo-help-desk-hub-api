# ============================================================================
# Prometheus — recolha de métricas
# ============================================================================
# Faz scrape do OpenTelemetry Collector:
#   - :8889 -> métricas da aplicação (exportadas pelo Collector)
#   - :8888 -> métricas internas do próprio Collector
# ============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector-app-metrics
    static_configs:
      - targets: ["otel-collector:8889"]
        labels:
          source: application

  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
        labels:
          source: collector

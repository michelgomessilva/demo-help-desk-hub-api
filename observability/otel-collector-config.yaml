# ============================================================================
# OpenTelemetry Collector — configuração
# ============================================================================
# Ponto central da observabilidade. Recebe traces e métricas da aplicação via
# OTLP/HTTP, lê os logs estruturados do ficheiro logs/app.jsonl (filelog) e
# distribui cada sinal para o backend correto:
#   - Traces  -> Tempo
#   - Métricas -> exposto para o Prometheus fazer scrape
#   - Logs    -> Loki (via OTLP nativo)
# ============================================================================

receivers:
  # Recebe traces e métricas enviados pela aplicação (OTLP).
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

  # Lê os logs JSON que a aplicação escreve em logs/app.jsonl.
  # Cada linha é um objeto JSON (formato JSONL) produzido pelo structlog.
  filelog:
    include:
      - /var/log/app/app.jsonl
    start_at: end
    operators:
      # Faz o parse de cada linha como JSON; o body original (linha crua) é
      # preservado para o Grafana extrair o trace_id via derived field.
      - type: json_parser
        parse_from: body
        severity:
          parse_from: attributes.level
          mapping:
            warn: warning

processors:
  batch: {}

  # Define o service.name nos logs para que o Loki crie o label service_name.
  resource/logs:
    attributes:
      - key: service.name
        value: helpdesk-hub-api
        action: upsert

exporters:
  # Traces -> Tempo (OTLP gRPC interno da rede docker)
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  # Métricas -> endpoint Prometheus (o Prometheus faz scrape em :8889)
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true

  # Logs -> Loki via ingestão OTLP nativa (Loki 3.x)
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [filelog]
      processors: [resource/logs, batch]
      exporters: [otlphttp/loki]

  # Métricas internas do próprio Collector (scrapadas pelo Prometheus em :8888).
  telemetry:
    metrics:
      address: 0.0.0.0:8888
